{{- $bootstrapRootCa := default (dict) .Values.bootstrapRootCa -}}
{{- $bootstrapRootCaConfigMapName := $bootstrapRootCa.configMapName | default "" -}}
{{- $bootstrapRootCaSecretName := $bootstrapRootCa.secretName | default "" -}}
{{- if and $bootstrapRootCaConfigMapName $bootstrapRootCaSecretName -}}
{{- fail "nico-pxe: set only one of bootstrapRootCa.configMapName or bootstrapRootCa.secretName" -}}
{{- end -}}
{{- $bootstrapRootCaEnabled := or $bootstrapRootCaConfigMapName $bootstrapRootCaSecretName -}}
{{- $bootstrapRootCaKey := $bootstrapRootCa.key | default "ca.crt" -}}
{{- $env := deepCopy (default (dict) .Values.env) -}}
{{- if $bootstrapRootCaEnabled -}}
{{- $_ := set $env "FORGE_BOOTSTRAP_ROOT_CAFILE_PATH" "/var/run/secrets/bootstrap-root-ca/ca.crt" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nico-pxe.name" . }}
  namespace: {{ include "nico-pxe.namespace" . }}
  labels:
    {{- include "nico-pxe.labels" . | nindent 4 }}
  annotations:
    {{- tpl (toYaml .Values.annotations) . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "nico-pxe.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nico-pxe.labels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: {{ include "nico-pxe.name" . }}
    spec:
      serviceAccountName: {{ include "nico-pxe.name" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.initContainers .Values.bootArtifactContainers }}
      initContainers:
        {{- range .Values.bootArtifactContainers }}
        - name: {{ .name }}
          image: {{ if and .repository .tag }}{{ .repository }}:{{ .tag }}{{ else }}{{ .image }}{{ end }}
          {{- with .command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .imagePullPolicy }}
          imagePullPolicy: {{ . }}
          {{- end }}
          volumeMounts:
            - name: boot-artifacts
              mountPath: /forge-boot-artifacts/blobs/internal
            {{- with .volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- end }}
        {{- with .Values.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ include "nico-pxe.name" . }}
          image: "{{ include "nico-pxe.image" . }}"
          # Pick whichever binary is in the image (nico-named or carbide-named).
          command:
            - /bin/sh
            - -c
            - |
              if [ -x /opt/nico/nico ]; then BIN=/opt/nico/nico; else BIN=/opt/carbide/carbide; fi
              exec "$BIN" -s {{ .Values.bootArtifacts.servePath }}
          env:
            {{- range $key, $value := $env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.envFrom }}
          envFrom:
            - configMapRef:
                name: {{ include "nico-pxe.name" . }}-env-config
                optional: {{ .Values.envFrom.pxeEnvConfig.optional | default true }}
          {{- end }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: spiffe
              mountPath: /var/run/secrets/spiffe.io
              readOnly: true
            {{- if $bootstrapRootCaEnabled }}
            - name: bootstrap-root-ca
              mountPath: /var/run/secrets/bootstrap-root-ca
              readOnly: true
            {{- end }}
            {{- if .Values.bootArtifactContainers }}
            - name: boot-artifacts
              mountPath: /forge-boot-artifacts/blobs/internal
            {{- end }}
      volumes:
        - name: spiffe
          secret:
            secretName: {{ include "nico-pxe.name" . }}-certificate
        {{- if $bootstrapRootCaEnabled }}
        - name: bootstrap-root-ca
          {{- if $bootstrapRootCaConfigMapName }}
          configMap:
            name: {{ $bootstrapRootCaConfigMapName | quote }}
            items:
              - key: {{ $bootstrapRootCaKey | quote }}
                path: ca.crt
          {{- else }}
          secret:
            secretName: {{ $bootstrapRootCaSecretName | quote }}
            items:
              - key: {{ $bootstrapRootCaKey | quote }}
                path: ca.crt
          {{- end }}
        {{- end }}
        {{- if .Values.bootArtifactContainers }}
        - name: boot-artifacts
          emptyDir: {}
        {{- end }}
