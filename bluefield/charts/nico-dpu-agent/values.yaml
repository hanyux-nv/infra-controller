### DPF contract ###
serviceDaemonSet:
  nodeSelector:
  labels: {}
  annotations: {}
  updateStrategy: {}
  resources: {}
exposedPorts:
  labels: {}
  ports: {}

### Cert directory on the host (also used as the container mountPath).
certsDir: /opt/forge

### Bootstrap CA source. The default preserves the legacy PXE download and
### renders the historical bare `init-container` invocation.
bootstrapCa:
  source: legacy_download
  # Empty uses the agent's historical built-in URL. Set only to override it in
  # legacy_download mode.
  url: ""
  # Required only for mounted mode. kind must be Secret or ConfigMap. The
  # selected key is projected as /var/run/secrets/nico-bootstrap-ca/ca.pem.
  # Mounted mode requires certsDir=/opt/forge, the dpu-agent's CA output path.
  # Use a new, versioned object name for CA rotation. Updating data under the
  # same name does not change the pod template or rerun the init container.
  object: {}
  # object:
  #   kind: Secret
  #   name: nico-bootstrap-ca-v1
  #   key: ca.crt
  # ConfigMap example:
  # object:
  #   kind: ConfigMap
  #   name: nico-bootstrap-ca-v1
  #   key: ca.crt

### Service specific values ###
image:
  repository: ""
  pullPolicy: IfNotPresent
  tag: ""
imagePullSecrets: []
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
securityContext:
  capabilities:
    add:
      - NET_ADMIN
      - SYS_ADMIN
      - DAC_OVERRIDE
      - NET_RAW
tolerations: []

### Values for agent operation
hbn:
  nvue_https_address: "nvue"
  nvue_credentials_secret_name: ""
  nvue_password_key: "password"
dhcp_server:
  # If interface_prepend is set to a non-empty string, it will
  # be turned into a --dhcp-server-interface-prepend argument.
  interface_prepend: ""
  # Will be updated in dpf_services.rs
  service_name: ""
fmds:
  # Will be updated in dpf_services.rs
  service_name: ""
