{{- $bootstrapCa := default (dict) .Values.bootstrapCa -}}
{{- $bootstrapCaSource := default "legacy_download" (get $bootstrapCa "source") -}}
{{- $bootstrapCaUrl := default "" (get $bootstrapCa "url") -}}
{{- $bootstrapCaObject := default (dict) (get $bootstrapCa "object") -}}
{{- $bootstrapCaObjectKind := default "" (get $bootstrapCaObject "kind") -}}
{{- $bootstrapCaObjectName := default "" (get $bootstrapCaObject "name") -}}
{{- $bootstrapCaObjectKey := "ca.crt" -}}
{{- if hasKey $bootstrapCaObject "key" -}}
{{- $bootstrapCaObjectKey = get $bootstrapCaObject "key" -}}
{{- end -}}
{{- $certsDir := .Values.certsDir | default "/opt/nico" -}}
{{- if not (has $bootstrapCaSource (list "legacy_download" "mounted")) -}}
{{- fail (printf "bootstrapCa.source must be one of legacy_download or mounted; got %q" $bootstrapCaSource) -}}
{{- end -}}
{{- if eq $bootstrapCaSource "legacy_download" -}}
  {{- if not (empty $bootstrapCaObject) -}}
  {{- fail "bootstrapCa.object is only valid when bootstrapCa.source is mounted" -}}
  {{- end -}}
{{- else -}}
  {{- if not (empty $bootstrapCaUrl) -}}
  {{- fail "bootstrapCa.url is only valid when bootstrapCa.source is legacy_download" -}}
  {{- end -}}
  {{- if not (has $bootstrapCaObjectKind (list "Secret" "ConfigMap")) -}}
  {{- fail "bootstrapCa.object.kind must be Secret or ConfigMap when bootstrapCa.source is mounted" -}}
  {{- end -}}
  {{- if empty $bootstrapCaObjectName -}}
  {{- fail "bootstrapCa.object.name is required when bootstrapCa.source is mounted" -}}
  {{- end -}}
  {{- if empty $bootstrapCaObjectKey -}}
  {{- fail "bootstrapCa.object.key must not be empty when bootstrapCa.source is mounted" -}}
  {{- end -}}
  {{- /* The init container installs the validated bundle at its fixed
         /opt/forge/forge_root.pem path, so the shared nico-certs hostPath must
         be mounted there. */ -}}
  {{- if ne $certsDir "/opt/forge" -}}
  {{- fail "bootstrapCa.source mounted requires certsDir=/opt/forge because the init container installs /opt/forge/forge_root.pem there" -}}
  {{- end -}}
{{- end -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "nico-dpu-agent.fullname" . }}
  labels:
    {{- include "nico-dpu-agent.labels" . | nindent 4 }}
    {{- with .Values.serviceDaemonSet.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    {{- with .Values.serviceDaemonSet.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.serviceDaemonSet.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nico-dpu-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.serviceDaemonSet.annotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nico-dpu-agent.selectorLabels" . | nindent 8 }}
        {{- with .Values.serviceDaemonSet.labels }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      dnsPolicy: ClusterFirst
      {{- if not (empty .Values.serviceDaemonSet.nodeSelector) }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
              {{- toYaml .Values.serviceDaemonSet.nodeSelector | nindent 12 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: nico-dpu-agent-init
          securityContext:
            privileged: true
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          args:
            - init-container
            {{- if eq $bootstrapCaSource "mounted" }}
            - "--bootstrap-ca-source=mounted"
            {{- else if not (empty $bootstrapCaUrl) }}
            - {{ printf "--bootstrap-ca-url=%s" $bootstrapCaUrl | quote }}
            {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: RUST_BACKTRACE
              value: "full"
            - name: RUST_LIB_BACKTRACE
              value: "0"
            - name: RUST_LOG
              value: "info"
          volumeMounts:
            - name: hw-cache
              mountPath: /data
            - name: sys
              mountPath: /sys
            - name: dev
              mountPath: /dev
            - name: run-udev
              mountPath: /run/udev
            - name: proc-cpu-info
              mountPath: /host-cpu-info
            - name: proc-mem-info
              mountPath: /host-mem-info
            - name: nico-certs
              mountPath: {{ .Values.certsDir | default "/opt/nico" }}
            - name: host-resolv-conf
              mountPath: /host-resolv.conf
              readOnly: true
            {{- if eq $bootstrapCaSource "mounted" }}
            - name: bootstrap-ca-source
              mountPath: /var/run/secrets/nico-bootstrap-ca
              readOnly: true
            {{- end }}
      containers:
        - name: nico-dpu-agent
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          args:
            - run
            - "--hbn-config-mode=nvue-rest"
            - "--agent-platform-type=containerized"
            - "--dhcp-grpc-server=http://carbide-dpf-cluster-{{ .Values.dhcp_server.service_name }}.dpf-operator-system.svc.cluster.local:10079"
            - "--fmds-grpc-server=http://carbide-dpf-cluster-{{ .Values.fmds.service_name }}.dpf-operator-system.svc.cluster.local:50052"
            {{- if not (empty .Values.dhcp_server.interface_prepend) }}
            - "--dhcp-server-interface-prepend={{ .Values.dhcp_server.interface_prepend }}"
            {{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with toYaml .Values.serviceDaemonSet.resources }}
          resources:
            limits:
              {{- . | nindent 14 }}
            requests:
              {{- . | nindent 14 }}
          {{- end }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP  # always resolves to cluster-internal IP
            - name: RUST_BACKTRACE
              value: "full"
            - name: RUST_LIB_BACKTRACE
              value: "0"
            - name: RUST_LOG
              value: "info"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: IGNORE_MGMT_VRF
              value: "1"
            - name: NVUE_HTTPS_ADDRESS
              value: carbide-dpf-cluster-{{ .Values.hbn.nvue_https_address }}.dpf-operator-system.svc.cluster.local:8765
            - name: NVUE_USERNAME
              value: "carbide"
            - name: NVUE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.hbn.nvue_credentials_secret_name }}
                  key: {{ .Values.hbn.nvue_password_key }}
          volumeMounts:
            - name: nico-certs
              mountPath: {{ .Values.certsDir | default "/opt/nico" }}
            - name: hw-cache
              mountPath: /data
              readOnly: true
      volumes:
        - name: nico-certs
          hostPath:
            path: {{ .Values.certsDir | default "/opt/nico" }}
            type: DirectoryOrCreate
        - name: hw-cache
          emptyDir: {}
        - name: sys
          hostPath:
            path: /sys
        - name: dev
          hostPath:
            path: /dev
        - name: run-udev
          hostPath:
            path: /run/udev
        - name: proc-cpu-info
          hostPath:
            path: /proc/cpuinfo
        - name: proc-mem-info
          hostPath:
            path: /proc/meminfo
        - name: host-resolv-conf
          hostPath:
            path: /etc/resolv.conf
            type: File
        {{- if eq $bootstrapCaSource "mounted" }}
        - name: bootstrap-ca-source
          {{- if eq $bootstrapCaObjectKind "Secret" }}
          secret:
            secretName: {{ $bootstrapCaObjectName | quote }}
            items:
              - key: {{ $bootstrapCaObjectKey | quote }}
                path: ca.pem
          {{- else }}
          configMap:
            name: {{ $bootstrapCaObjectName | quote }}
            items:
              - key: {{ $bootstrapCaObjectKey | quote }}
                path: ca.pem
          {{- end }}
        {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
